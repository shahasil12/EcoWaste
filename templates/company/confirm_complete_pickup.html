<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Pickup Completion - EcoGreen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text2: #94a3b8;
            --teal: #10b981;
            --blue: #3b82f6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .confirm-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--teal);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        h2 { font-weight: 700; margin-bottom: 1rem; }
        p { color: var(--text2); margin-bottom: 2rem; line-height: 1.6; }

        .details-box {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .detail-label { color: var(--text2); }
        .detail-value { font-weight: 600; color: var(--text); }

        .btn-confirm {
            background: linear-gradient(135deg, var(--teal), var(--blue));
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            color: white;
            opacity: 0.9;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text2);
            padding: 0.8rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="confirm-card">
        <div class="icon-box">
            <i class="bi bi-truck"></i>
        </div>
        <h2>Complete Pickup?</h2>
        <p>Are you sure you want to mark this pickup request as completed? This will award 20 points to the citizen.</p>
        
        <div class="details-box">
            <div class="detail-item">
                <span class="detail-label">Citizen:</span>
                <span class="detail-value">{{ pickup.citizen.username }}</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Waste Type:</span>
                <span class="detail-value">{{ pickup.waste_type }}</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Address:</span>
                <span class="detail-value">{{ pickup.address }}</span>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-confirm">Yes, Mark Completed</button>
            <a href="{% url 'company_dashboard' company_id %}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</body>
</html>
