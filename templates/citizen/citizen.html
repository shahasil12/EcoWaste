{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Register/Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/citizen_auth.css' %}">
</head>
<body>
<style>
    .django-message {
        display: block;
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 15px;
        text-align: center;
        font-weight: 500;
    }
    .django-message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
    .django-message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
</style>

<div class="container">
    {% if request.session.citizen_id %}
        <div style="background: rgba(16,185,129,0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(16,185,129,0.2);">
            <span style="font-weight: 600; font-size: 0.9rem;">You are currently logged in</span>
            <div style="display: flex; gap: 10px;">
                <a href="{% url 'citizen_home' %}" style="color: #10b981; text-decoration: none; font-size: 0.85rem; font-weight: 600;">Dashboard</a>
                <a href="{% url 'citizen_logout' %}" style="color: #ef4444; text-decoration: none; font-size: 0.85rem; font-weight: 600;">Logout</a>
            </div>
        </div>
    {% endif %}

    <div class="toggle-btns">
        <button id="loginToggle" class="toggle-btn active">Login</button>
        <button id="registerToggle" class="toggle-btn">Register</button>
    </div>

    {% if messages %}
        <div class="django-messages-container">
            {% for message in messages %}
                <div class="django-message {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- Login Form -->
    <form id="loginForm" action="{% url 'citizen_login' %}"  class="active" method="POST" autocomplete="off">
         {% csrf_token %}
    {{ login_form.as_p }}
        
        <button type="submit" class="btn">Login</button>
    </form>
    <!-- Register Form -->
   <form id="registerForm" method="POST" action="{% url 'register_user' %}" autocomplete="off" style="display:none;">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Register</button>
</form>
    <div id="message" class="message"></div>
</div>
<script src="{% static 'js/citizen_auth.js' %}"></script>
<script>
    // Override default JS tab if active_tab context is provided
    const defaultTab = "{{ active_tab|default:'login' }}";
    if (defaultTab === 'register') {
        switchForm('register');
    }
</script>
</body>
</html>
